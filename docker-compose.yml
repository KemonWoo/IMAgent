# docker-compose.yml — IMAgent Relay + APK hosting
version: "3.8"
services:
  relay:
    build: .
    container_name: imagent-relay
    ports:
      - "8099:8099"
    volumes:
      - ./apk:/var/www/html
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/health"]
      interval: 30s
      timeout: 5s
      retries: 3
