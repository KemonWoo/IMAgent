name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build relay (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: "-arm64"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: "-macos"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: "-macos-arm64"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            CGO_ENABLED=0 go build -ldflags="-s -w" \
            -o imagent-relay${{ matrix.ext }} ./cmd/relay/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagent-relay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: imagent-relay${{ matrix.ext }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            imagent-relay-*/imagent-relay*
          generate_release_notes: true
